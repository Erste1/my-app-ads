<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRONAS | Minimal Mechanics</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Inter:wght@200;400&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* КРЕАТИВНАЯ ШАПКА: "ИСЧЕЗАЮЩИЙ ЗАГОЛОВОК" */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            perspective: 1000px;
        }

        .hero h1 {
            font-family: 'Cinzel', serif; /* Элегантный антикварный шрифт */
            font-size: clamp(4rem, 15vw, 10rem);
            font-weight: 900;
            margin: 0;
            letter-spacing: 20px;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.2);
            transition: 1s ease;
            cursor: default;
        }

        .hero h1:hover {
            -webkit-text-stroke: 1px rgba(255,255,255,1);
            letter-spacing: 30px;
            filter: blur(0px);
        }

        .hero-desc {
            margin-top: 20px;
            font-weight: 200;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-size: 0.8rem;
            color: #444;
        }

        /* КОНТЕНТ: ЭФФЕКТ ЭКСПОЗИЦИИ */
        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px;
        }

        .app-block {
            border-top: 1px solid #1a1a1a;
            padding: 80px 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            transition: 0.6s;
        }

        .app-block:hover {
            border-top-color: #fff;
        }

        .app-info h2 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            margin: 0;
            font-weight: 400;
        }

        .app-info .type {
            color: #555;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
            display: block;
        }

        .app-description {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #888;
            max-width: 450px;
        }

        .view-link {
            display: inline-block;
            margin-top: 40px;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            border-bottom: 1px solid #fff;
            padding-bottom: 5px;
            transition: 0.3s;
        }

        .view-link:hover {
            letter-spacing: 3px;
            color: #888;
            border-bottom-color: transparent;
        }

        /* ФУТЕР ДЛЯ ЯНДЕКСА */
        footer {
            padding: 100px 20px;
            text-align: center;
            opacity: 0.3;
            font-size: 0.7rem;
            letter-spacing: 2px;
        }

        footer a { color: #fff; text-decoration: none; }

        @media (max-width: 768px) {
            .app-block { grid-template-columns: 1fr; }
            .hero h1 { letter-spacing: 10px; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>KRONAS</h1>
        <div class="hero-desc">Experimental Software Workshop</div>
    </div>

    <div class="content">

        <div class="app-block">
            <div class="app-info">
                <span class="type">01 / Scientific Motion</span>
                <h2>Квантум</h2>
            </div>
            <div class="app-details">
                <p class="app-description">
                    Математический инструмент, скрывающий в себе физическую симуляцию. 
                    Мы превратили скучные вычисления в визуальный опыт, где каждое число имеет вес и инерцию.
                </p>
                <a href="https://www.rustore.ru/catalog/app/com.quantum.calculator" class="view-link">OPEN PROJECT →</a>
            </div>
        </div>
        </div>

    <footer>
        © 2026 KRONAS LABS — <a href="app-ads.txt">AUTHORIZED DEVELOPER</a>
    </footer>

</body>
</html>
